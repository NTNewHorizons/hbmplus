name: Build Mod

on: [push, pull_request]

jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v3  
      - name: Set up JDK 8  
        uses: actions/setup-java@v3  
        with:  
          java-version: '8'  
      - name: Build with Gradle  
        run: ./gradlew build  
